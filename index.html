<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ask Milo - Milano Bright 21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        :root {
            --milo-yellow: #F4C430; 
            --milo-orange: #E89635;
            --milo-bg: #FAF9F6;
        }
        
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            height: -webkit-fill-available;
            color: #1a1a1a;
            overflow: hidden; 
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            height: 100%;
        }

        /* HEADER FISSO */
        header {
            flex-shrink: 0;
            z-index: 50;
            position: relative;
        }

        /* AREA CHAT CON SCROLL */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: var(--milo-bg);
            background-image: radial-gradient(var(--milo-yellow) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* INPUT AREA FISSA IN BASSO */
        .input-area {
            flex-shrink: 0;
            background: white;
            border-top: 1px solid #eee;
            padding: 12px 16px 24px 16px;
            z-index: 50;
        }

        .bot-bubble, .user-bubble {
            padding: 14px 18px;
            margin-bottom: 12px;
            max-width: 88%;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: slideUp 0.3s ease-out;
            word-wrap: break-word;
        }

        .bot-bubble {
            background: white;
            border-left: 5px solid var(--milo-yellow);
            border-radius: 4px 18px 18px 18px;
            align-self: flex-start;
        }

        .user-bubble {
            background: var(--milo-yellow);
            border-radius: 18px 18px 4px 18px;
            align-self: flex-end;
            color: #000;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .typing-dot {
            width: 6px; height: 6px;
            background: #adb5bd;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header class="bg-gradient-to-r from-yellow-400 to-orange-500 p-5 text-white flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <div class="bg-white p-2 rounded-xl">
                <i class="fas fa-robot text-yellow-500 text-2xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Milo Concierge</h1>
                <p class="text-[10px] uppercase tracking-tighter opacity-90">Bright 21 - Via Sammartini</p>
            </div>
        </div>
        <div class="relative group">
            <button id="lang-btn" onclick="toggleLang(event)" class="bg-white/20 px-3 py-1 rounded-full flex items-center gap-2 border border-white/10">
                <span id="active-flag">🇬🇧</span> <i class="fas fa-chevron-down text-[10px]"></i>
            </button>
            <div id="lang-menu" class="hidden absolute right-0 mt-2 bg-white text-black rounded-xl shadow-2xl z-50 w-36 border border-gray-100 overflow-hidden">
                <div class="p-3 hover:bg-yellow-50 cursor-pointer flex items-center gap-2 border-b border-gray-50" onclick="setLang('en')"><span>🇬🇧</span> English</div>
                <div class="p-3 hover:bg-yellow-50 cursor-pointer flex items-center gap-2 border-b border-gray-50" onclick="setLang('it')"><span>🇮🇹</span> Italiano</div>
                <div class="p-3 hover:bg-yellow-50 cursor-pointer flex items-center gap-2 border-b border-gray-50" onclick="setLang('es')"><span>🇪🇸</span> Español</div>
                <div class="p-3 hover:bg-yellow-50 cursor-pointer flex items-center gap-2" onclick="setLang('fr')"><span>🇫🇷</span> Français</div>
            </div>
        </div>
    </header>

    <div id="chat-container"></div>

    <div class="input-area">
        <form onsubmit="handleSend(event)" class="flex gap-2 items-center">
            <input type="text" id="user-input" autocomplete="off" placeholder="Ask Milo..." class="flex-1 bg-gray-100 rounded-2xl px-5 py-3.5 outline-none focus:ring-2 focus:ring-yellow-400 text-base">
            <button type="submit" class="bg-yellow-400 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-transform">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<script>
    const groqKey = "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"; 
    let currentLang = 'en'; 
    let chatHistory = [];

    window.onload = () => { setLang('en', false); };

    function toggleLang(e) { 
        e.stopPropagation();
        document.getElementById('lang-menu').classList.toggle('hidden'); 
    }

    function updateInterface(lang) {
        const flags = { 'it': '🇮🇹', 'en': '🇬🇧', 'es': '🇪🇸', 'fr': '🇫🇷' };
        document.getElementById('active-flag').innerText = flags[lang] || '🌐';
        const placeholders = { 'it': 'Chiedi a Milo...', 'en': 'Ask Milo...', 'es': 'Pregunta a Milo...', 'fr': 'Demander à Milo...' };
        document.getElementById('user-input').placeholder = placeholders[lang] || placeholders['en'];
    }

    function setLang(lang, clearChat = true) {
        currentLang = lang;
        updateInterface(lang);
        const welcome = {
            'it': 'Ciao! Sono Milo, l\'assistente di Bright 21. Come posso aiutarti?',
            'en': 'Hi! I am Milo, your Bright 21 assistant. How can I help you?',
            'es': '¡Hola! Soy Milo. ¿In che cosa posso aiutarti?',
            'fr': 'Salut ! Je suis Milo. Comment posso-je t\'aider ?'
        };
        if(clearChat) { document.getElementById('chat-container').innerHTML = ''; chatHistory = []; }
        addMessage(welcome[lang] || welcome['en'], 'bot');
        document.getElementById('lang-menu').classList.add('hidden');
    }

    function scrollToBottom() {
        const chat = document.getElementById('chat-container');
        chat.scrollTop = chat.scrollHeight;
    }

    function addMessage(text, type) {
        const chat = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = type === 'bot' ? 'bot-bubble' : 'user-bubble';
        div.innerHTML = `<p>${text.replace(/\n/g, '<br>')}</p>`;
        chat.appendChild(div);
        
        // Scroll immediato e ritardato per gestire il rendering del testo lungo
        scrollToBottom();
        setTimeout(scrollToBottom, 50);
        setTimeout(scrollToBottom, 250);
        return div;
    }

    async function handleSend(e) {
        e.preventDefault();
        const input = document.getElementById('user-input');
        const msg = input.value.trim();
        if(!msg) return;

        addMessage(msg, 'user');
        input.value = '';
        const loader = addMessage('<div class="flex gap-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>', 'bot');

        const systemPrompt = `Sei Milo, concierge di "Bright 21" (Via Sammartini 21, Milano).
        REGOLE:
        1. Rispondi SEMPRE nella lingua dell'utente.
        2. TRASPORTI MILANO (IMPORTANTE):
           - Per lo STADIO SAN SIRO (Meazza): Da Via Sammartini, andare in Stazione Centrale. Prendere Metro Verde (M2) per 2 fermate fino a GARIBALDI. A Garibaldi cambiare con la Metro Lilla (M5) e scendere a SAN SIRO STADIO.
           - Per il DUOMO: Metro Gialla (M3) da Centrale.
        3. CASA: Wi-Fi su foglio plastificato con QR in soggiorno. 3° piano senza ascensore.
        4. FOCUS: Solo consigli turistici e info casa. Se chiedono cose storiche/scientifiche non attinenti a Milano, declina gentilmente.`;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "system", content: systemPrompt }, ...chatHistory.slice(-10), { role: "user", content: msg }],
                    temperature: 0.7 
                })
            });

            const data = await response.json();
            loader.remove();

            if (response.ok) {
                const botReply = data.choices[0].message.content;
                addMessage(botReply, 'bot');
                chatHistory.push({ role: "user", content: msg }, { role: "assistant", content: botReply });
            }
        } catch (err) {
            loader.remove();
            addMessage("Errore di connessione.", "bot");
        }
    }

    window.onclick = function(event) { if (!event.target.closest('.group')) document.getElementById('lang-menu').classList.add('hidden'); }
</script>
</body>
</html>
