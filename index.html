<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Milo — Bright 21 Concierge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --yolk: #E8A820;
    --amber: #D4841A;
    --cream: #FDF6E3;
    --warm-white: #FFFEF9;
    --ink: #1C1710;
    --muted: #7A6E5C;
    --border: rgba(232,168,32,0.25);
    --bubble-bot: #FFFEF9;
    --bubble-user: #E8A820;
    --shadow: 0 4px 24px rgba(28,23,16,0.08);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

  html, body {
    height: 100%; height: 100dvh;
    background: #F0E9D6;
    display: flex;
    justify-content: center;
    align-items: stretch;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    overflow: hidden;
  }

  .shell {
    width: 100%; max-width: 480px;
    display: flex; flex-direction: column;
    height: 100%; height: 100dvh;
    background: var(--warm-white);
    position: relative;
    overflow: hidden;
  }

  /* ── HEADER ── */
  .header {
    flex: 0 0 auto;
    background: var(--yolk);
    padding: 14px 18px 14px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
    z-index: 10;
  }

  .header::after {
    content: '';
    position: absolute; bottom: -6px; left: 0; right: 0; height: 6px;
    background: linear-gradient(to bottom, rgba(232,168,32,0.3), transparent);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .milo-avatar-small {
    width: 46px; height: 46px; flex-shrink: 0;
  }

  .header-info h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--ink);
    line-height: 1;
  }

  .header-info p {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(28,23,16,0.6);
    margin-top: 2px;
  }

  .status-dot {
    display: inline-block; width: 7px; height: 7px;
    background: #2ECC71; border-radius: 50%;
    margin-right: 5px; animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Lang selector */
  .lang-wrap { position: relative; }

  .lang-btn {
    background: rgba(255,255,255,0.5);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 20px;
    padding: 6px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    color: var(--ink);
  }

  .lang-menu {
    display: none;
    position: absolute; right: 0; top: calc(100% + 8px);
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    z-index: 100;
    min-width: 140px;
  }

  .lang-menu.open { display: block; }

  .lang-opt {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }

  .lang-opt:hover { background: var(--cream); }

  /* ── CHAT AREA ── */
  .chat {
    flex: 1 1 0%;
    overflow-y: auto;
    padding: 20px 16px 8px;
    display: flex; flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
    background-color: var(--cream);
    background-image:
      radial-gradient(circle, rgba(232,168,32,0.18) 1px, transparent 1px);
    background-size: 22px 22px;
  }

  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── BUBBLES ── */
  .row { display: flex; align-items: flex-end; gap: 8px; }
  .row.bot { align-self: flex-start; max-width: 90%; }
  .row.user { align-self: flex-end; flex-direction: row-reverse; max-width: 88%; }

  .avatar-mini {
    width: 28px; height: 28px; flex-shrink: 0; align-self: flex-end;
  }

  .bubble {
    padding: 12px 16px;
    font-size: 14.5px;
    line-height: 1.55;
    animation: rise 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards;
    word-break: break-word;
  }

  .bubble.bot {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    color: var(--ink);
    box-shadow: var(--shadow);
  }

  .bubble.user {
    background: var(--bubble-user);
    border-radius: 18px 4px 18px 18px;
    color: var(--ink);
    font-weight: 500;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Typing */
  .typing-row { display: flex; align-items: flex-end; gap: 8px; align-self: flex-start; }
  .typing-bubble {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
    box-shadow: var(--shadow);
  }

  .dot {
    width: 6px; height: 6px;
    background: var(--amber);
    border-radius: 50%;
    animation: boing 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes boing {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-5px); }
  }

  /* Suggestion chips */
  .chips {
    display: flex; flex-wrap: wrap; gap: 7px;
    margin-top: 6px;
  }

  .chip {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12.5px;
    cursor: pointer;
    color: var(--amber);
    font-weight: 500;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .chip:hover { background: var(--yolk); color: var(--ink); }
  .chip:active { transform: scale(0.96); }

  /* ── INPUT ── */
  .input-bar {
    flex: 0 0 auto;
    background: var(--warm-white);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; gap: 10px; align-items: center;
  }

  #msg {
    flex: 1;
    background: var(--cream);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  #msg:focus { border-color: var(--yolk); }
  #msg::placeholder { color: var(--muted); }

  .send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--yolk);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s, background 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--amber); }
  .send-btn:active { transform: scale(0.9); }

  .send-btn svg { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <!-- Milo SVG Avatar -->
      <svg class="milo-avatar-small" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Body -->
        <ellipse cx="50" cy="68" rx="24" ry="20" fill="#1C1710"/>
        <!-- Collar/scarf -->
        <ellipse cx="50" cy="55" rx="18" ry="9" fill="#E8A820"/>
        <!-- Head -->
        <ellipse cx="50" cy="42" rx="22" ry="21" fill="#F5C842"/>
        <!-- Face shadow -->
        <ellipse cx="50" cy="46" rx="16" ry="13" fill="#E8A820" opacity="0.4"/>
        <!-- Eyes -->
        <ellipse cx="42" cy="40" rx="4.5" ry="5" fill="white"/>
        <ellipse cx="58" cy="40" rx="4.5" ry="5" fill="white"/>
        <circle cx="43.5" cy="41" r="2.8" fill="#1C1710"/>
        <circle cx="59.5" cy="41" r="2.8" fill="#1C1710"/>
        <!-- Pupils shine -->
        <circle cx="44.5" cy="40" r="1" fill="white"/>
        <circle cx="60.5" cy="40" r="1" fill="white"/>
        <!-- Beak -->
        <path d="M46 49 Q50 54 54 49 Q50 46 46 49Z" fill="#D4841A"/>
        <!-- Ears/horns -->
        <ellipse cx="29" cy="28" rx="7" ry="9" fill="#F5C842" transform="rotate(-15 29 28)"/>
        <ellipse cx="71" cy="28" rx="7" ry="9" fill="#F5C842" transform="rotate(15 71 28)"/>
        <ellipse cx="29" cy="27" rx="3.5" ry="5" fill="#E8A820" transform="rotate(-15 29 27)"/>
        <ellipse cx="71" cy="27" rx="3.5" ry="5" fill="#E8A820" transform="rotate(15 71 27)"/>
        <!-- Hat/bowtie accent -->
        <path d="M38 53 Q50 58 62 53" stroke="#1C1710" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- Cheeks -->
        <ellipse cx="35" cy="48" rx="5" ry="3" fill="#E07B20" opacity="0.35"/>
        <ellipse cx="65" cy="48" rx="5" ry="3" fill="#E07B20" opacity="0.35"/>
      </svg>

      <div class="header-info">
        <h1>Milo</h1>
        <p><span class="status-dot"></span>Bright 21 · Via Sammartini</p>
      </div>
    </div>

    <div class="lang-wrap">
      <button class="lang-btn" id="langBtn" onclick="toggleMenu(event)">
        <span id="flagEl">🇬🇧</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="lang-menu" id="langMenu">
        <div class="lang-opt" onclick="setLang('en')">🇬🇧 English</div>
        <div class="lang-opt" onclick="setLang('it')">🇮🇹 Italiano</div>
        <div class="lang-opt" onclick="setLang('es')">🇪🇸 Español</div>
        <div class="lang-opt" onclick="setLang('fr')">🇫🇷 Français</div>
        <div class="lang-opt" onclick="setLang('de')">🇩🇪 Deutsch</div>
        <div class="lang-opt" onclick="setLang('zh')">🇨🇳 中文</div>
        <div class="lang-opt" onclick="setLang('ja')">🇯🇵 日本語</div>
      </div>
    </div>
  </header>

  <!-- CHAT -->
  <div class="chat" id="chat"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <input type="text" id="msg" placeholder="Ask Milo…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 12L21 3L12 21L10 13L3 12Z" fill="#1C1710"/>
      </svg>
    </button>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are Milo, the warm and knowledgeable concierge of apartment "Bright 21" at Via Sammartini 21, Milan, Italy (3rd floor, no elevator).

APARTMENT INFO:
- Wi-Fi password: on the laminated card in the living room
- Floor: 3rd, no elevator
- Check-out: 11:00 AM (leave keys on the kitchen table)
- Heating: thermostat on the living room wall, set between 18-22°C
- Washing machine: press "Cotone 40°" for a standard wash, 2h cycle
- Dishwasher: tablets under the sink, select "Eco" mode
- Garbage: differentiated bins in the courtyard (paper/plastic/organic/glass)
- Emergency contact: +39 333 000 0000

MILAN TRANSPORT (from Centrale FS, 5 min walk):
- LINATE AIRPORT: Metro M4 (blue line) → Linate, ~20 min, runs 6am-12am
- MALPENSA AIRPORT: Malpensa Express train from Centrale, ~50 min, every 30 min
- DUOMO/CENTER: M3 (yellow) direct, 4 stops, ~8 min
- NAVIGLI: M3 yellow → Duomo, M2 green → Sant'Agostino (or tram 2)
- SAN SIRO STADIUM: M2 green → Cadorna → M5 purple → San Siro Stadio
- BRERA/MOSCOVA: M2 green → Moscova
- LAMBRATE (Fabrique club): M2 green → Lambrate, 4 stops

MUST-DO IN MILAN:
- Duomo di Milano & rooftop (book tickets online!)
- Last Supper (book months in advance at vivaticket.com)
- Brera Art Gallery (free first Sunday of month)
- Navigli canals on weekend evenings
- Quadrilatero della Moda (Montenapoleone, Via della Spiga)
- Aperitivo in Porta Nuova or Isola district (18:00–21:00)

TOP EATS NEAR BRIGHT 21:
- Pane & Acqua (Via Sammartini 2): excellent panini, open early
- Pizzeria Spontini (Via Spontini 14): legendary thick-crust pizza, ~15 min walk
- Mercato Centrale Milano (inside Centrale station): gourmet food hall
- Ratanà (Via De Castillia 28): modern Milanese cuisine, book ahead

RULES:
- Always reply in the SAME LANGUAGE as the user's message.
- Be warm, concise, and practical — like a local friend, not a formal hotel.
- For complex directions, give step-by-step Metro instructions (line color + name).
- If you don't know something specific, say so honestly and suggest they check Google Maps or the local tourist office.
- Never make up addresses, phone numbers, or prices.`;

let lang = 'en';
let history = [];

const chat = document.getElementById('chat');
const msgInput = document.getElementById('msg');

const WELCOME = {
  en: `Ciao! 👋 I'm **Milo**, your personal concierge for Bright 21.\n\nI'm here to help with everything — apartment info, Milan tips, how to get around, restaurant picks, and more.\n\n*Feel free to write in your language!* 🌍`,
  it: `Ciao! 👋 Sono **Milo**, il tuo concierge di Bright 21.\n\nSono qui per tutto — info sull'appartamento, consigli su Milano, trasporti, ristoranti e altro ancora.\n\n*Scrivi pure nella tua lingua!* 🌍`,
  es: `¡Hola! 👋 Soy **Milo**, tu conserje personal de Bright 21.\n\nEstoy aquí para ayudarte con todo — info del apartamento, consejos sobre Milán, transporte y más.\n\n*¡Puedes escribirme en tu idioma!* 🌍`,
  fr: `Bonjour ! 👋 Je suis **Milo**, ton concierge personnel du Bright 21.\n\nJe suis là pour tout — infos sur l'appartement, conseils sur Milan, transports, restaurants et plus encore.\n\n*Écris-moi dans ta langue !* 🌍`,
  de: `Hallo! 👋 Ich bin **Milo**, dein persönlicher Concierge des Bright 21.\n\nIch helfe dir bei allem — Wohnungsinfos, Mailand-Tipps, Transport, Restaurants und mehr.\n\n*Schreib ruhig in deiner Sprache!* 🌍`,
  zh: `你好！👋 我是 **Milo**，Bright 21 的私人礼宾。\n\n我可以帮助你了解公寓信息、米兰旅游攻略、交通指南和餐厅推荐。\n\n*请用你的语言和我交流！* 🌍`,
  ja: `こんにちは！👋 私は **Milo**、Bright 21 のコンシェルジュです。\n\nアパートの情報、ミラノ観光、交通案内、レストランなど何でもお気軽にどうぞ。\n\n*あなたの言語でどうぞ！* 🌍`
};

const CHIPS = {
  en: ['🚇 How to reach Duomo?', '✈️ Airport transport', '🍕 Best restaurants nearby', '📶 Wi-Fi password', '🔐 Check-out info'],
  it: ['🚇 Come arrivo al Duomo?', '✈️ Come raggiungo l\'aeroporto?', '🍕 Migliori ristoranti vicini', '📶 Password Wi-Fi', '🔐 Info check-out'],
  es: ['🚇 ¿Cómo llego al Duomo?', '✈️ Transporte aeropuerto', '🍕 Mejores restaurantes', '📶 Contraseña Wi-Fi', '🔐 Info check-out'],
  fr: ['🚇 Comment aller au Duomo?', '✈️ Transport aéroport', '🍕 Meilleurs restaurants', '📶 Mot de passe Wi-Fi', '🔐 Info check-out'],
  de: ['🚇 Wie komme ich zum Duomo?', '✈️ Flughafen Transport', '🍕 Beste Restaurants', '📶 WLAN Passwort', '🔐 Check-out Info'],
  zh: ['🚇 如何前往大教堂?', '✈️ 机场交通', '🍕 附近最佳餐厅', '📶 WiFi密码', '🔐 退房信息'],
  ja: ['🚇 ドゥオーモへの行き方', '✈️ 空港へのアクセス', '🍕 近くのおすすめレストラン', '📶 Wi-Fiパスワード', '🔐 チェックアウト情報']
};

function miloAvatarSVG(size = 32) {
  return `<svg class="avatar-mini" width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="50" cy="68" rx="24" ry="20" fill="#1C1710"/>
    <ellipse cx="50" cy="55" rx="18" ry="9" fill="#E8A820"/>
    <ellipse cx="50" cy="42" rx="22" ry="21" fill="#F5C842"/>
    <ellipse cx="50" cy="46" rx="16" ry="13" fill="#E8A820" opacity="0.4"/>
    <ellipse cx="42" cy="40" rx="4.5" ry="5" fill="white"/>
    <ellipse cx="58" cy="40" rx="4.5" ry="5" fill="white"/>
    <circle cx="43.5" cy="41" r="2.8" fill="#1C1710"/>
    <circle cx="59.5" cy="41" r="2.8" fill="#1C1710"/>
    <circle cx="44.5" cy="40" r="1" fill="white"/>
    <circle cx="60.5" cy="40" r="1" fill="white"/>
    <path d="M46 49 Q50 54 54 49 Q50 46 46 49Z" fill="#D4841A"/>
    <ellipse cx="29" cy="28" rx="7" ry="9" fill="#F5C842" transform="rotate(-15 29 28)"/>
    <ellipse cx="71" cy="28" rx="7" ry="9" fill="#F5C842" transform="rotate(15 71 28)"/>
    <ellipse cx="29" cy="27" rx="3.5" ry="5" fill="#E8A820" transform="rotate(-15 29 27)"/>
    <ellipse cx="71" cy="27" rx="3.5" ry="5" fill="#E8A820" transform="rotate(15 71 27)"/>
    <ellipse cx="35" cy="48" rx="5" ry="3" fill="#E07B20" opacity="0.35"/>
    <ellipse cx="65" cy="48" rx="5" ry="3" fill="#E07B20" opacity="0.35"/>
  </svg>`;
}

function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addBotMessage(text, showChips = false) {
  const row = document.createElement('div');
  row.className = 'row bot';
  row.innerHTML = miloAvatarSVG(32);
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = `<p>${renderMarkdown(text)}</p>`;

  if (showChips && CHIPS[lang]) {
    const chipWrap = document.createElement('div');
    chipWrap.className = 'chips';
    CHIPS[lang].forEach(c => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = c;
      chip.onclick = () => { msgInput.value = c; send(); };
      chipWrap.appendChild(chip);
    });
    bubble.appendChild(chipWrap);
  }

  row.appendChild(bubble);
  chat.appendChild(row);
  bubble.scrollIntoView({ behavior: 'smooth', block: 'start' });
  return row;
}

function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'row user';
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.innerHTML = `<p>${text}</p>`;
  row.appendChild(bubble);
  chat.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.innerHTML = `${miloAvatarSVG(32)}<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(row);
  row.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return row;
}

function toggleMenu(e) {
  e.stopPropagation();
  document.getElementById('langMenu').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('langMenu').classList.remove('open');
});

function setLang(l) {
  lang = l;
  const flags = { en:'🇬🇧', it:'🇮🇹', es:'🇪🇸', fr:'🇫🇷', de:'🇩🇪', zh:'🇨🇳', ja:'🇯🇵' };
  document.getElementById('flagEl').textContent = flags[l] || '🇬🇧';
  document.getElementById('langMenu').classList.remove('open');
  const ph = { en:'Ask Milo…', it:'Chiedi a Milo…', es:'Pregunta a Milo…', fr:'Demande à Milo…', de:'Frag Milo…', zh:'问Milo…', ja:'Miloに聞く…' };
  msgInput.placeholder = ph[l] || ph['en'];
  chat.innerHTML = '';
  history = [];
  addBotMessage(WELCOME[l] || WELCOME.en, true);
}

async function send() {
  const text = msgInput.value.trim();
  if (!text) return;
  msgInput.value = '';
  addUserMessage(text);

  const typing = addTyping();

  history.push({ role: 'user', content: text });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history.slice(-10)
      })
    });

    const data = await res.json();
    typing.remove();

    const reply = data.content?.[0]?.text || 'Sorry, something went wrong. Please try again!';
    history.push({ role: 'assistant', content: reply });
    addBotMessage(reply, false);

  } catch (err) {
    typing.remove();
    addBotMessage('Oops! Connection error. Please try again in a moment. 🔌', false);
  }
}

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Init
window.onload = () => setLang('en');
</script>
</body>
</html>
